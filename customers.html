<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Handled - Customers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: #0e0f11; --surface: #16181c; --surface2: #1e2127; --border: #2a2d35;
      --accent: #f0c040; --text: #f0ece4; --muted: #7a7f8e; --radius: 14px; --radius-sm: 8px; --success: #4ade80; --warning: #e07b30;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding-top: 66px;}
    h2, h3, h4 { font-family: 'Syne', sans-serif; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(14,15,17,.92); display: flex; align-items: center; justify-content: space-between; padding: 0 2.5rem; height: 66px; border-bottom: 1px solid var(--border); }
    .nav-brand { font-family: 'Syne', sans-serif; font-weight: 800; color: var(--accent); text-decoration: none; font-size: 1.4rem;}
    .nav-links { display: flex; list-style: none; }
    .nav-links a { padding: 8px 13px; font-size: .84rem; color: var(--muted); text-decoration: none; }
    .nav-links a.active { color: var(--accent); background: rgba(240,192,64,.09); border-radius: 6px; }
    .nav-right { display: flex; align-items: center; gap: .8rem; }
    .nav-right a { font-size: .85rem; font-weight: 700; color: #0e0f11; background: var(--accent); text-decoration: none; padding: 6px 14px; border-radius: 20px; font-family: 'Syne', sans-serif; }
    .section { padding: 5rem 2.5rem; }
    .section-inner { max-width: 1100px; margin: 0 auto; }
    .auth-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; max-width: 860px; margin: 0 auto; }
    @media(max-width:680px) { .auth-grid { grid-template-columns: 1fr; } }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: .78rem; margin-bottom: .35rem; color: var(--muted); }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: .6rem .9rem; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text); font-family: inherit; font-size: .88rem; }
    .form-group input:focus { outline: none; border-color: var(--accent); }
    .btn { display: inline-flex; padding: 10px 22px; border-radius: var(--radius-sm); cursor: pointer; border: none; font-weight: 500; text-decoration: none; }
    .btn-primary { background: var(--accent); color: #0e0f11; }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .dashboard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; }
    .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    #taskMap { height: 280px; border-radius: var(--radius-sm); margin: 1rem 0; border: 1.5px solid var(--border); }
    .price-estimate { background: rgba(240,192,64,.06); border: 1.5px solid rgba(240,192,64,.2); border-radius: var(--radius-sm); padding: .9rem 1.2rem; font-size: .9rem; margin-top: .8rem; }
    .price-estimate strong { color: var(--accent); font-size: 1.1rem; }
    .task-list { display: flex; flex-direction: column; gap: 1rem; }
    .task-item { border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 1.2rem 1.4rem; display: flex; justify-content: space-between; background: var(--surface2); }
    .alert { padding: .8rem 1.2rem; border-radius: var(--radius-sm); font-size: .85rem; margin-bottom: 1rem; }
    .alert-warning { background: rgba(240,192,64,.08); color: var(--accent); border: 1px solid rgba(240,192,64,.25); }
    .status-badge { font-size: .7rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; }
    .status-badge.pending { background: rgba(240,192,64,.15); color: var(--accent); }
    .hidden { display: none !important; }
    footer { background: var(--surface); text-align: center; padding: 2rem; margin-top: 4rem; border-top: 1px solid var(--border); color: var(--muted); }
    footer a { color: var(--muted); text-decoration: none; margin: 0 .6rem; }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">Handled🤝</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="workers.html">Workers</a></li>
    <li><a href="customers.html" class="active">Customers</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <div class="nav-right" id="navAuthZone">
    <a href="customers.html">Login / Sign Up</a>
  </div>
</nav>

<div class="page" style="display:block;">
  <section class="section">
    <div class="section-inner">
      
      <!-- AUTH INTERFACE -->
      <div id="customerAuthSection">
        <div class="auth-grid">
          
          <!-- CUSTOMER LOGIN -->
          <div class="auth-card">
            <h3>Customer Login</h3><br>
            <div class="form-group"><label>Email address</label><input type="email" id="cLoginEmail" placeholder="you@example.com" /></div>
            <div class="form-group"><label>Password</label><input type="password" id="cLoginPass" placeholder="Your password" /></div>
            <div id="cLoginError" class="alert alert-warning hidden"></div>
            <button class="btn btn-primary" style="width:100%" onclick="customerLogin()">Log In</button>
          </div>
          
          <!-- CUSTOMER ACCOUNT REGISTRATION -->
          <div class="auth-card">
            <h3>Create an Account</h3><br>
            <div class="form-group"><label>Full name</label><input type="text" id="cRegName" placeholder="Your name" /></div>
            <div class="form-group"><label>Email address</label><input type="email" id="cRegEmail" placeholder="you@example.com" /></div>
            <div class="form-group"><label>Password</label><input type="password" id="cRegPass" placeholder="At least 8 characters" /></div>
            <div class="form-group"><label>Phone number</label><input type="tel" id="cRegPhone" placeholder="+267 7X XXX XXX" /></div>
            <div id="cRegError" class="alert alert-warning hidden"></div>
            <button class="btn btn-primary" style="width:100%" onclick="customerRegister()">Create Account</button>
          </div>
        </div>
      </div>

      <!-- INTERACTIVE USER DASHBOARD -->
      <div id="customerDashboard" class="hidden">
        <div class="dashboard">
          <div class="dashboard-header">
            <h3 id="customerWelcome">Welcome back</h3>
            <button class="btn btn-outline" onclick="customerLogout()">Log out</button>
          </div>
          
          <div style="background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:1.6rem; margin-bottom:2rem">
            <h4 style="margin-bottom:1rem">Post a New Job</h4>
            <div class="form-group">
              <label>Service Type</label>
              <select id="taskService" onchange="updateTaskSubOptions()">
                <option value="">— Choose a service —</option>
                <option value="cleaning">🏠 House Cleaning</option>
                <option value="gardening">🌿 Gardening</option>
                <option value="moving">📦 Moving Assistance</option>
                <option value="handyman">🔨 Handyman</option>
                <option value="plumbing">🔧 Plumbing</option>
                <option value="delivery">🛵 Delivery</option>
                <option value="misc">🎲 Miscellaneous</option>
              </select>
            </div>
            <div class="form-group" id="taskSubGroup" style="display:none"><label>Specify job details</label><select id="taskSub" onchange="updatePriceEstimate()"></select></div>
            <div class="form-group">
              <label>Drop a pin on the map (click to place layout flag)</label>
              <div id="taskMap"></div>
              <div style="font-size:.78rem;color:var(--muted);margin-top:.3rem" id="locationStatus">No location selected.</div>
            </div>
            <div class="form-group"><label>Description</label><textarea id="taskDesc" rows="3" placeholder="Provide extra helpful descriptions..."></textarea></div>
            <div class="price-estimate" id="priceEstimate">Select a service to see price estimate.</div><br>
            <button class="btn btn-primary" onclick="postTask()">Post Job</button>
          </div>

          <h4>My Jobs</h4><br>
          <div id="customerTaskList" class="task-list"><p style="color:var(--muted);font-size:.86rem">No jobs posted yet.</p></div>
        </div>
      </div>

    </div>
  </section>
  <footer>
    <a href="index.html">Home</a><a href="services.html">Services</a><a href="about.html">About</a><a href="contact.html">Contact</a>
  </footer>
</div>

<script>
let state = { currentUser: null, tasks: [], workers: [], customers: [], taskLat: null, taskLng: null, insideGaborone: true, mapInstance: null, mapMarker: null };
const GBB = { minLat:-24.72, maxLat:-24.55, minLng:25.83, maxLng:25.99 };
function isInsideGaborone(lat,lng){ return lat>=GBB.minLat&&lat<=GBB.maxLat&&lng>=GBB.minLng&&lng<=GBB.maxLng; }

const SERVICE_OPTIONS = {
  cleaning:[{label:'Single Room',price:120},{label:'1 Bedroom',price:180},{label:'2 Bedroom',price:250},{label:'3 Bedroom',price:350}],
  gardening:[{label:'Small Garden',price:120},{label:'Medium Garden',price:220},{label:'Large Garden',price:350}],
  moving:[{label:'Single Item',price:150},{label:'Room Move',price:300}],
  handyman:[{label:'Simple Fix',price:120},{label:'Furniture Assembly',price:180}],
  plumbing:[{label:'Leaking Tap',price:150},{label:'Blocked Drain',price:220}],
  delivery:[{label:'Small Package',price:50},{label:'Medium Package',price:80}],
  misc:[{label:'Describe your task below',price:150}]
};

function loadState(){ 
  try { 
    const s = localStorage.getItem('handled_state'); 
    if(s){
      const d = JSON.parse(s); 
      if(d.tasks) state.tasks = d.tasks; 
      if(d.workers) state.workers = d.workers; 
      if(d.customers) state.customers = d.customers;
    } 
    const sessionUser = localStorage.getItem('handled_current_user');
    if(sessionUser) { state.currentUser = JSON.parse(sessionUser); }
  } catch(e){} 
}

function saveState(){ 
  try { 
    localStorage.setItem('handled_state', JSON.stringify({tasks:state.tasks, workers:state.workers, customers:state.customers})); 
    if(state.currentUser) {
      localStorage.setItem('handled_current_user', JSON.stringify(state.currentUser));
    } else {
      localStorage.removeItem('handled_current_user');
    }
  } catch(e){} 
}

window.addEventListener('DOMContentLoaded', () => {
  loadState();
  if(state.currentUser) {
    if(document.getElementById('customerDashboard')) {
      showDashboardInterface(state.currentUser.name);
    }
  }
});

function customerLogin(){
  const email=document.getElementById('cLoginEmail').value.trim(); const pass=document.getElementById('cLoginPass').value;
  const errEl=document.getElementById('cLoginError'); errEl.classList.add('hidden');
  const cust=state.customers.find(c=>c.email===email&&c.password===pass);
  if(!cust){ errEl.textContent='Incorrect credentials.'; errEl.classList.remove('hidden'); return; }
  state.currentUser=cust;
  saveState();
  showDashboardInterface(cust.name);
}

function customerRegister(){
  const name=document.getElementById('cRegName').value.trim(); 
  const email=document.getElementById('cRegEmail').value.trim(); 
  const pass=document.getElementById('cRegPass').value;
  const phone=document.getElementById('cRegPhone').value.trim();
  const errEl=document.getElementById('cRegError'); errEl.classList.add('hidden');
  
  if(!name || !email || !pass || !phone){ errEl.textContent='All fields are required.'; errEl.classList.remove('hidden'); return; }
  if(pass.length < 8){ errEl.textContent='Password must be at least 8 characters long.'; errEl.classList.remove('hidden'); return; }
  if(state.customers.find(c=>c.email===email)){ errEl.textContent='This email already exists.'; errEl.classList.remove('hidden'); return; }
  
  const cust={id:Date.now(), name, email, password:pass, phone}; 
  state.customers.push(cust); 
  state.currentUser=cust;
  saveState();
  showDashboardInterface(name);
}

function showDashboardInterface(name){
  document.getElementById('customerAuthSection').classList.add('hidden');
  document.getElementById('customerDashboard').classList.remove('hidden');
  document.getElementById('customerWelcome').textContent='Welcome, '+name;
  document.getElementById('navAuthZone').innerHTML = `<span style="font-size:0.85rem;color:var(--accent)">👋 ${name}</span>`;
  setTimeout(initMap, 200);
  refreshCustomerDashboard();
}

function customerLogout(){ 
  localStorage.removeItem('handled_current_user');
  window.location.reload(); 
}

function initMap(){
  if(state.mapInstance) return;
  const map=L.map('taskMap').setView([-24.6282,25.9231],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  state.mapInstance=map;
  map.on('click',function(e){
    const {lat,lng}=e.latlng; state.taskLat=lat; state.taskLng=lng; state.insideGaborone=isInsideGaborone(lat,lng);
    if(state.mapMarker) state.mapMarker.setLatLng([lat,lng]);
    else state.mapMarker=L.marker([lat,lng],{draggable:true}).addTo(map).on('dragend', function(evt){
      const pt = evt.target.getLatLng();
      state.taskLat=pt.lat; state.taskLng=pt.lng; state.insideGaborone=isInsideGaborone(pt.lat,pt.lng);
      updateLocationStatus(); updatePriceEstimate();
    });
    updateLocationStatus(); updatePriceEstimate();
  });
}

function updateLocationStatus(){
  document.getElementById('locationStatus').textContent=`📍 ${state.taskLat.toFixed(4)}, ${state.taskLng.toFixed(4)} — ${state.insideGaborone?'Gaborone Region (+P30)':'Outside Boundaries (+P50)'}`;
}

function updateTaskSubOptions(){
  const svc=document.getElementById('taskService').value; const subGroup=document.getElementById('taskSubGroup'); const subSel=document.getElementById('taskSub');
  if(!svc){subGroup.style.display='none'; return;}
  subSel.innerHTML=SERVICE_OPTIONS[svc].map(o=>`<option value="${o.price}">${o.label}</option>`).join('');
  subGroup.style.display=''; updatePriceEstimate();
}

function updatePriceEstimate(){
  const subPrice=parseInt(document.getElementById('taskSub').value)||0; const transport=state.insideGaborone?30:50;
  document.getElementById('priceEstimate').innerHTML=`<strong>Estimated total execution fee: P${subPrice+transport}</strong>`;
}

function postTask(){
  const svc=document.getElementById('taskService').value; if(!svc||state.taskLat===null) { alert('Specify your job types and pin maps.'); return; }
  const subSel=document.getElementById('taskSub'); const subPrice=parseInt(subSel.value)||0; const subLabel=subSel.options[subSel.selectedIndex].text;
  const total=subPrice+(state.insideGaborone?30:50);
  const task={id:Date.now(), customerName:state.currentUser.name, serviceLabel:svc, subLabel, price:total, status:'pending'};
  state.tasks.push(task); saveState(); refreshCustomerDashboard();
  alert('Job Task Successfully Sent!');
}

function refreshCustomerDashboard(){
  const list=document.getElementById('customerTaskList');
  if(!state.tasks.length){ list.innerHTML='<p style="color:var(--muted)">No active requests found.</p>'; return; }
  list.innerHTML=state.tasks.map(t=>`<div class="task-item"><div><strong>${t.subLabel}</strong><br><span style="color:var(--muted)">Est P${t.price}</span></div><div><span class="status-badge pending">${t.status}</span></div></div>`).join('');
}
</script>
</body>
</html>
