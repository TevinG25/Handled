<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Handled - Workers Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0f11; --surface: #16181c; --surface2: #1e2127; --border: #2a2d35;
      --accent: #f0c040; --text: #f0ece4; --muted: #7a7f8e; --radius: 14px; --radius-sm: 8px; --success: #4ade80;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding-top: 66px;}
    h2, h3, h4 { font-family: 'Syne', sans-serif; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(14,15,17,.92); display: flex; align-items: center; justify-content: space-between; padding: 0 2.5rem; height: 66px; border-bottom: 1px solid var(--border); }
    .nav-brand { font-family: 'Syne', sans-serif; font-weight: 800; color: var(--accent); text-decoration: none; font-size: 1.4rem;}
    .nav-links { display: flex; list-style: none; }
    .nav-links a { padding: 8px 13px; font-size: .84rem; color: var(--muted); text-decoration: none; }
    .nav-links a.active { color: var(--accent); background: rgba(240,192,64,.09); border-radius: 6px; }
    .nav-right { display: flex; align-items: center; gap: .8rem; }
    .nav-right a { font-size: .85rem; font-weight: 700; color: #0e0f11; background: var(--accent); text-decoration: none; padding: 6px 14px; border-radius: 20px; font-family: 'Syne', sans-serif; }
    .section { padding: 5rem 2.5rem; }
    .section-inner { max-width: 1100px; margin: 0 auto; }
    .auth-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; max-width: 860px; margin: 0 auto; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: .78rem; margin-bottom: .35rem; color: var(--muted); }
    .form-group input, .form-group select { width: 100%; padding: .6rem .9rem; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text); }
    .btn { display: inline-flex; padding: 10px 22px; border-radius: var(--radius-sm); cursor: pointer; border: none; font-weight: 500; text-decoration: none; }
    .btn-primary { background: var(--accent); color: #0e0f11; }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .dashboard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; }
    .task-list { display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem; }
    .task-item { border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 1.2rem 1.4rem; display: flex; justify-content: space-between; background: var(--surface2); }
    .alert { padding: .8rem 1.2rem; border-radius: var(--radius-sm); font-size: .85rem; margin-bottom: 1rem; }
    .alert-warning { background: rgba(240,192,64,.08); color: var(--accent); border: 1px solid rgba(240,192,64,.25); }
    .hidden { display: none !important; }
    footer { background: var(--surface); text-align: center; padding: 2rem; margin-top: 4rem; border-top: 1px solid var(--border); color: var(--muted); }
    footer a { color: var(--muted); text-decoration: none; margin: 0 .6rem; }
  </style>
</head>
<body>

<nav aria-label="Main navigation">
  <a class="nav-brand" href="index.html">Handled🤝</a>
  <ul class="nav-links" role="list">
    <li><a href="services.html">Home</a></li>
    <li><a href="index.html" >Services</a></li>
    <li><a href="index.html" class="active">Workers</a></li>
    <li><a href="customers.html">Customers</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <div class="nav-right">
    <a href="customers.html" style="font-size: .85rem; font-weight: 700; color: #0e0f11; background: var(--accent); text-decoration: none; padding: 6px 14px; border-radius: 20px; font-family: 'Syne', sans-serif;">Login / Sign Up</a>
  </div>
</nav>

<div class="page" style="display:block;">
  <section class="section">
    <div class="section-inner">

      <!-- AUTH INTERFACE -->
      <div id="workerAuthSection">
        <div class="auth-grid">
          <div class="auth-card">
            <h3>Worker Login</h3><br>
            <div class="form-group"><label>Email address</label><input type="email" id="wLoginEmail" placeholder="you@example.com" /></div>
            <div class="form-group"><label>Password</label><input type="password" id="wLoginPass" placeholder="Password" /></div>
            <div id="wLoginError" class="alert alert-warning hidden"></div>
            <button class="btn btn-primary" style="width:100%" onclick="workerLogin()">Log In</button>
          </div>
          <div class="auth-card">
            <h3>Register as a Worker</h3><br>
            <div class="form-group"><label>Full name</label><input type="text" id="wRegName" placeholder="Your full name" /></div>
            <div class="form-group"><label>Email address</label><input type="email" id="wRegEmail" placeholder="you@example.com" /></div>
            <div class="form-group"><label>Password</label><input type="password" id="wRegPass" placeholder="At least 8 characters" /></div>
            <div class="form-group"><label>Government ID Document</label><input type="file" id="kycId" /></div>
            <div id="wRegError" class="alert alert-warning hidden"></div>
            <button class="btn btn-primary" style="width:100%" onclick="workerRegister()">Register & Submit KYC</button>
          </div>
        </div>
      </div>

      <!-- WORKER DASHBOARD -->
      <div id="workerDashboard" class="hidden">
        <div class="dashboard">
          <div style="display:flex; justify-content:space-between; align-items:center">
            <div><h3 id="workerWelcome">Welcome back</h3><p style="color:var(--muted); font-size:0.85rem">KYC Status: Approved</p></div>
            <button class="btn btn-outline" onclick="workerLogout()">Log out</button>
          </div>
          <br><hr style="border-color:var(--border)"><br>
          <h4>Available Job Stream Feed</h4>
          <div id="workerJobList" class="task-list">Searching active system feed...</div>
        </div>
      </div>

    </div>
  </section>
  <footer>
    <a href="index.html">Home</a><a href="services.html">Services</a><a href="about.html">About</a><a href="contact.html">Contact</a>
  </footer>
</div>

<script>
let state = { currentUser: null, tasks: [], workers: [] };

function loadState(){ try { const s=localStorage.getItem('handled_state'); if(s){const d=JSON.parse(s); if(d.tasks)state.tasks=d.tasks; if(d.workers)state.workers=d.workers;} } catch(e){} }
function saveState(){ try { localStorage.setItem('handled_state',JSON.stringify({tasks:state.tasks, workers:state.workers})); } catch(e){} }

window.addEventListener('DOMContentLoaded', () => {
  loadState();
});

function workerLogin(){
  const email=document.getElementById('wLoginEmail').value.trim(); const pass=document.getElementById('wLoginPass').value;
  const errEl=document.getElementById('wLoginError'); errEl.classList.add('hidden');
  const worker=state.workers.find(w=>w.email===email&&w.password===pass);
  if(!worker){ errEl.textContent='Invalid Account Match.'; errEl.classList.remove('hidden'); return; }
  state.currentUser=worker;
  showDashboard(worker.name);
}

function workerRegister(){
  const name=document.getElementById('wRegName').value.trim(); const email=document.getElementById('wRegEmail').value.trim(); const pass=document.getElementById('wRegPass').value;
  const errEl=document.getElementById('wRegError'); errEl.classList.add('hidden');
  if(!name||!email||!pass){ errEl.textContent='Please fill details.'; errEl.classList.remove('hidden'); return; }
  const worker={id:Date.now(), name, email, password:pass}; state.workers.push(worker); saveState();
  state.currentUser=worker;
  showDashboard(name);
}

function showDashboard(name){
  document.getElementById('workerAuthSection').classList.add('hidden');
  document.getElementById('workerDashboard').classList.remove('hidden');
  document.getElementById('workerWelcome').textContent='Welcome, '+name;
  document.getElementById('navAuthZone').innerHTML = `<span style="font-size:0.85rem;color:var(--accent)">👷 ${name}</span>`;
  renderAvailableJobs();
}

function renderAvailableJobs(){
  const list=document.getElementById('workerJobList');
  if(!state.tasks.length){ list.innerHTML='<p style="color:var(--muted)">No jobs pending execution in Gaborone.</p>'; return; }
  list.innerHTML=state.tasks.map(t=>`<div class="task-item"><div><strong>${t.subLabel}</strong><br><span style="color:var(--muted)">Compensation: P${t.price}</span></div><button class="btn btn-primary" onclick="alert('Accepted!')">Accept Job</button></div>`).join('');
}

function workerLogout(){ window.location.reload(); }
</script>
</body>
</html>
